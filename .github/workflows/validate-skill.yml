name: Validate skills

on:
  pull_request:
    paths:
      - "skills/**"
      - ".github/workflows/validate-skill.yml"
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - ".github/workflows/validate-skill.yml"

jobs:
  validate-skills:
    name: Validate skill files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Validate skill folders and headings
        shell: bash
        run: |
          set -euo pipefail

          required_headings=(
            "## What It Does"
            "## When To Use It"
            "## Inputs"
            "## Output"
            "## Example Prompt"
            "## Safety Notes"
          )

          found_skill=false

          for skill_file in skills/*/SKILL.md; do
            [ -e "$skill_file" ] || continue
            found_skill=true

            skill_dir="$(basename "$(dirname "$skill_file")")"

            if [[ ! "$skill_dir" =~ ^[a-z]+-[a-z0-9]+(-[a-z0-9]+){1,4}$ ]]; then
              echo "::error file=$skill_file::Skill folder must start with a first name and use lowercase kebab-case, like amie-spreadsheet-cleaner."
              exit 1
            fi

            if ! grep -Eq '^# .+' "$skill_file"; then
              echo "::error file=$skill_file::SKILL.md must start with a level-1 title."
              exit 1
            fi

            for heading in "${required_headings[@]}"; do
              if ! grep -Fxq "$heading" "$skill_file"; then
                echo "::error file=$skill_file::Missing required heading: $heading"
                exit 1
              fi
            done
          done

          if [ "$found_skill" = false ]; then
            echo "::error::No skill files found under skills/*/SKILL.md."
            exit 1
          fi

          echo "All skill files look good."
